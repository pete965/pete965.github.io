baseURL = 'https://pete965.github.io/'
languageCode = 'zh-cn'
title = '皮特爱吃咖喱的博客'
theme = 'hugo-theme-stack'
defaultContentLanguage = 'zh-cn'

[params]
  mainSections = ['posts']
  featuredImageField = 'image'
  favicon = ''

[params.sidebar]
  subtitle = '技术与生活'
  avatar = ''

[params.article]
  math = false
  toc = true
  readingTime = true

[params.comments]
  enabled = false

[menu]
  [[menu.main]]
    name = '首页'
    url = '/'
    weight = 1
    [menu.main.params]
      icon = 'home'

  [[menu.main]]
    name = '文章'
    url = '/posts'
    weight = 2
    [menu.main.params]
      icon = 'archives'

  [[menu.main]]
    name = '分类'
    url = '/categories'
    weight = 3
    [menu.main.params]
      icon = 'categories'

  [[menu.main]]
    name = '标签'
    url = '/tags'
    weight = 4
    [menu.main.params]
      icon = 'tag'

  [[menu.main]]
    name = '关于'
    url = '/about'
    weight = 5
    [menu.main.params]
      icon = 'user'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[pagination]
  pagerSize = 10

[params.widgets]
  [[params.widgets.page]]
    type = 'toc'

[markup.tableOfContents]
  startLevel = 1
  endLevel = 4

[markup.highlight]
  lineNos = true
  style = 'monokai'

[markup.goldmark.renderer]
  unsafe = true
