<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
// busuanzi uses site_pv container to toggle visibility; we use our own container
var _busuanzi_callback = function() {
    var el = document.getElementById('site-stats');
    if (el) el.style.display = '';
};
// poll for busuanzi to fill in values
(function check() {
    var pv = document.getElementById('busuanzi_value_site_pv');
    if (pv && pv.textContent) { _busuanzi_callback(); return; }
    setTimeout(check, 200);
})();
</script>
<style>
#site-stats {
    padding: 0 var(--menu-padding);
    list-style: none;
}
.site-stats-text {
    font-size: 0.9rem;
    color: var(--body-text-color);
    opacity: 0.5;
}
</style>
